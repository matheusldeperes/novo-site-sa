    <link rel="stylesheet" href="./styles/style.css" />

  <body data-page="blog">
    <div class="info-bar">
      <div class="shell info-bar-inner"><strong>Horário de atendimento:</strong> Seg a Sex - 8h às 12h - 13:30h às 18h</div>
    </div>

    <header class="site-header">
      <div class="shell topbar">

          <img src="./assets/logo_exp.png" alt="Satte Alam" class="logo-image" />

        <nav class="main-nav" aria-label="Menu principal">

      <section id="articleSection" class="blog-article" hidden>
        <p class="eyebrow">Matéria selecionada</p>
        <h2 id="articleTitle"></h2>
        <div id="articleImages" class="blog-images"></div>
        <article id="articleBody" class="blog-body"></article>
        <p id="articleMeta" class="blog-meta"></p>
      </section>
    </main>

    <footer class="footer shell" id="blogFooter"></footer>

    <script type="module" src="./scripts/blog.js"></script>
